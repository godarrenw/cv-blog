<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#faf9f5"/>

  <!-- Left accent bar -->
  <rect x="72" y="72" width="4" height="486" fill="#006600" opacity="0.18"/>

  <!-- Green circle decoration top-right -->
  <circle cx="1128" cy="72" r="50" fill="#006600" opacity="0.12"/>
  <circle cx="1128" cy="72" r="32" fill="#006600" opacity="0.18"/>

  <!-- Main name -->
  <text x="108" y="400" font-family="'PingFang SC', 'Noto Sans SC', 'Source Han Sans SC', sans-serif"
        font-size="96" font-weight="700" fill="#1a1a1a" letter-spacing="-2">朱奕樟</text>

  <!-- Latin name -->
  <text x="112" y="468" font-family="'Poppins', 'Inter', Helvetica, sans-serif"
        font-size="36" font-weight="400" fill="#555" letter-spacing="2">Zhu Yizhang</text>

  <!-- Divider -->
  <rect x="108" y="492" width="320" height="2" fill="#006600" opacity="0.4"/>

  <!-- Affiliation -->
  <text x="108" y="540" font-family="'PingFang SC', 'Noto Sans SC', sans-serif"
        font-size="24" fill="#666">中山大学先进制造学院 · 硕博连读</text>

  <!-- Tags bottom-right -->
  <text x="1092" y="580" text-anchor="end" font-family="'PingFang SC', 'Noto Sans SC', sans-serif"
        font-size="18" fill="#888" letter-spacing="1">PHM · 时空建模 · 量化</text>

  <!-- Small green circle bottom-right corner -->
  <circle cx="1160" cy="590" r="18" fill="#006600" opacity="0.7"/>
</svg>
